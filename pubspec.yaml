name: today_madness
description: "今日份发疯 - 情绪视觉化卡片生成器"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # UI 相关
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0

  # 状态管理
  provider: ^6.1.2

  # 数据库 (移动端用 sqflite，桌面端用 sqflite_common_ffi)
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4+3
  path_provider: ^2.1.5
  path: ^1.9.0

  # 本地持久化
  shared_preferences: ^2.3.4

  # 网络请求
  dio: ^5.7.0

  # 权限 & 相册保存
  permission_handler: ^11.3.1
  image_gallery_saver_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # 本地发疯语录资产
  assets:
    - assets/madness_local.json
